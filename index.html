            allDiv.className = `filter-tag ${!state.filterTag ? 'active' : ''}`;
            allDiv.innerText = '全部';
            allDiv.onclick = () => filterByTag(null);
            setupLongPress(allDiv, () => openTagManager());
            container.innerHTML = '';
            container.appendChild(allDiv);
            allTags.forEach(tag => {
                const isBlocked = state.blockedTags.includes(tag);
                const div = document.createElement('div');
                div.className = `filter-tag ${state.filterTag === tag ? 'active' : ''} ${isBlocked ? 'blocked' : ''}`;
                div.innerText = tag;
                div.onclick = () => filterByTag(tag);
                div.oncontextmenu = (e) => { e.preventDefault(); toggleBlockTag(tag); };
                container.appendChild(div);
            });
        }
        function filterByTag(tag) { if(state.blockedTags.includes(tag)) return; state.filterTag = tag; renderList(); renderTags(); }
        function toggleBlockTag(tag) { if(state.blockedTags.includes(tag)) state.blockedTags = state.blockedTags.filter(t => t !== tag); else { state.blockedTags.push(tag); if(state.filterTag===tag) state.filterTag=null; } renderList(); renderTags(); }

        let _selectedTagsToDelete = new Set();
        function openTagManager() {
            _selectedTagsToDelete = new Set();
            const allTags = new Set();
            state.notes.forEach(n => n.tags.forEach(t => allTags.add(t)));
            const list = document.getElementById('tag-manage-list');
            list.innerHTML = '';
            allTags.forEach(tag => {
                const el = document.createElement('div');
                el.className = 'filter-tag';
                el.innerText = tag;
                el.style.cursor = 'pointer';
                el.onclick = () => {
                    if (_selectedTagsToDelete.has(tag)) {
                        _selectedTagsToDelete.delete(tag);
                        el.style.background = '';
                        el.style.color = '';
                    } else {
                        _selectedTagsToDelete.add(tag);
                        el.style.background = '#ff6b6b';
                        el.style.color = '#fff';
                    }
                };
                list.appendChild(el);
            });
            openModal('tag-manage-modal');
        }

        function deleteSelectedTags() {
            if (_selectedTagsToDelete.size === 0) return;
            if (!confirm(`确认删除这 ${_selectedTagsToDelete.size} 个标签？（笔记本身保留）`)) return;
            state.notes.forEach(note => {
                note.tags = note.tags.filter(t => !_selectedTagsToDelete.has(t));
            });
            // 同步清理blockedTags和filterTag
            state.blockedTags = state.blockedTags.filter(t => !_selectedTagsToDelete.has(t));
            if (_selectedTagsToDelete.has(state.filterTag)) state.filterTag = null;
            _selectedTagsToDelete = new Set();
            saveData(); renderList(); renderTags();
            closeModal('tag-manage-modal');
        }
        function handleSearch(val) { state.searchQuery = val; renderList(); }

        // ===================== 日历 =====================
        let _calYear = new Date().getFullYear();
        let _calMonth = new Date().getMonth();
        let _statsMode = {};
        let _calPickStep = 0; // 0=没选 1=选了起始 2=选完

        function toggleCalPanel() {
            const panel = document.getElementById('cal-panel');
            const overlay = document.getElementById('cal-overlay');
            const btn = document.getElementById('cal-btn');
            const isOpen = panel.classList.contains('open');
            if (isOpen) {
                panel.classList.remove('open');
                overlay.classList.remove('open');
                btn.classList.remove('active');
            } else {
                const btnRect = btn.getBoundingClientRect();
                panel.style.top = (btnRect.bottom + 6) + 'px';
                panel.classList.add('open');
                overlay.classList.add('open');
                btn.classList.add('active');
                renderCalendar();
                renderStats();
            }
        }

        // 日历月份切换
        function calChangeMonth(dir) {
            _calMonth += dir;
            if (_calMonth > 11) { _calMonth = 0; _calYear++; }
            if (_calMonth < 0) { _calMonth = 11; _calYear--; }
            renderCalendar();
        }

        function dateToKey(y, m, d) {
            return `${y} ${m} ${d}`;
        }
        function parseSpaceDate(str) {
            if (!str) return null;
            const parts = str.trim().split(/\s+/);
            if (parts.length < 3) return null;
            const d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            return isNaN(d) ? null : d;
        }
        function keyToDate(key) {
            if (!key) return null;
            return parseSpaceDate(key);
        }

        function renderCalendar() {
            const label = document.getElementById('cal-month-label');
            const grid = document.getElementById('cal-grid');
            label.innerText = `${_calYear}年 ${_calMonth + 1}月`;

            const noteDates = new Set();
            state.notes.forEach(n => {
                const d = new Date(n.timestamp);
                if (!isNaN(d)) noteDates.add(`${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`);
            });

            const today = new Date(); today.setHours(0,0,0,0);
            const firstDay = new Date(_calYear, _calMonth, 1);
            const lastDay = new Date(_calYear, _calMonth + 1, 0);
            const startDow = firstDay.getDay();

            const fromDate = keyToDate(state.filterDateFrom);
            if (fromDate) fromDate.setHours(0,0,0,0);
            const toDate = keyToDate(state.filterDateTo);
            if (toDate) toDate.setHours(0,0,0,0);

            grid.innerHTML = '';
            ['日','一','二','三','四','五','六'].forEach(d => {
                const el = document.createElement('div');
                el.className = 'cal-weekday'; el.innerText = d;
                grid.appendChild(el);
            });

            for (let i = 0; i < startDow; i++) {
                const el = document.createElement('div'); el.className = 'cal-cell other-month';
                const prevDate = new Date(_calYear, _calMonth, -startDow + i + 1);
                el.innerText = prevDate.getDate();
                grid.appendChild(el);
            }

            for (let d = 1; d <= lastDay.getDate(); d++) {
                const el = document.createElement('div');
                el.className = 'cal-cell';
                // 数字用span包裹确保在伪元素上层
                const span = document.createElement('span');
                span.style.cssText = 'position:relative;z-index:3;';
                span.innerText = d;
                el.appendChild(span);

                const noteKey = `${_calYear}-${_calMonth}-${d}`;
                if (noteDates.has(noteKey)) el.classList.add('has-note');

                const thisDate = new Date(_calYear, _calMonth, d);
                thisDate.setHours(0,0,0,0);

                if (thisDate.getTime() === today.getTime()) el.classList.add('today');

                if (fromDate && toDate) {
                    if (thisDate.getTime() === fromDate.getTime()) el.classList.add('range-start');
                    else if (thisDate.getTime() === toDate.getTime()) el.classList.add('range-end');
                    else if (thisDate > fromDate && thisDate < toDate) el.classList.add('in-range');
                } else if (fromDate) {
                    if (thisDate.getTime() === fromDate.getTime()) el.classList.add('range-start', 'no-end');
                }

                el.onclick = () => calSelectDate(_calYear, _calMonth + 1, d);
                grid.appendChild(el);
            }

            const totalCells = startDow + lastDay.getDate();
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remaining; i++) {
                const el = document.createElement('div'); el.className = 'cal-cell other-month';
                el.innerText = i; grid.appendChild(el);
            }
        }

        function calSelectDate(y, m, d) {
            const key = dateToKey(y, m, d);
            const picked = new Date(y, m-1, d); picked.setHours(0,0,0,0);

            if (_calPickStep !== 1) {
                // 没有等待结束日：重新开始，设起始
                state.filterDateFrom = key;
                state.filterDateTo = null;
                _calPickStep = 1;
            } else {
                // 已有起始，设结束
                const from = keyToDate(state.filterDateFrom);
                from.setHours(0,0,0,0);
                if (picked.getTime() === from.getTime()) {
                    // 点同一天：单日完成
                    state.filterDateTo = null;
                    _calPickStep = 2;
                } else if (picked < from) {
                    // 比起始早：交换
                    state.filterDateTo = state.filterDateFrom;
                    state.filterDateFrom = key;
                    _calPickStep = 2;
                } else {
                    state.filterDateTo = key;
                    _calPickStep = 2;
                }
            }

            const fromInput = document.getElementById('cal-date-from');
            const toInput = document.getElementById('cal-date-to');
            if (fromInput) fromInput.value = state.filterDateFrom || '';
            if (toInput) toInput.value = state.filterDateTo || '';

            renderCalendar();
            renderList();
            renderStats();
        }

        function calGoToInput() {
            const fromVal = document.getElementById('cal-date-from').value.trim();
            const toVal = document.getElementById('cal-date-to').value.trim();
            if (!fromVal && !toVal) return;
            if (fromVal) {
                const d = parseSpaceDate(fromVal);
                if (!d) { alert('起始日期格式错误，请输入如：2021 5 21'); return; }
                state.filterDateFrom = dateToKey(d.getFullYear(), d.getMonth()+1, d.getDate());
                _calYear = d.getFullYear(); _calMonth = d.getMonth();
            }
            if (toVal) {
                const d = parseSpaceDate(toVal);
                if (!d) { alert('结束日期格式错误，请输入如：2021 5 21'); return; }
                state.filterDateTo = dateToKey(d.getFullYear(), d.getMonth()+1, d.getDate());
            }
            // 手动输入完成后，重置为「完成」态，下次点日历会重新开始选
            _calPickStep = 2;
            renderCalendar(); renderList(); renderStats();
        }

        function calClearFilter() {
            state.filterDateFrom = null; state.filterDateTo = null;
            _calPickStep = 0;
            const fromInput = document.getElementById('cal-date-from');
            const toInput = document.getElementById('cal-date-to');
            if (fromInput) fromInput.value = '';
            if (toInput) toInput.value = '';
            renderCalendar(); renderList(); renderStats();
        }

        // ===================== 统计 =====================
        function getStatsForRange(type, refFrom, refTo) {
            const ref = refFrom ? new Date(refFrom) : new Date();
            let notes = 0, chars = 0;
            state.notes.forEach(n => {
                const d = new Date(n.timestamp);
                if (isNaN(d)) return;
                let match = false;
                if (type === 'year') match = d.getFullYear() === ref.getFullYear();
                else if (type === 'month') match = d.getFullYear() === ref.getFullYear() && d.getMonth() === ref.getMonth();
                else if (type === 'week') {
                    const startOfWeek = new Date(ref);
                    startOfWeek.setDate(ref.getDate() - ref.getDay());
                    startOfWeek.setHours(0,0,0,0);
                    const endOfWeek = new Date(startOfWeek);
                    endOfWeek.setDate(startOfWeek.getDate() + 7);
                    match = d >= startOfWeek && d < endOfWeek;
                } else if (type === 'day') {
                    match = d.getFullYear() === ref.getFullYear() && d.getMonth() === ref.getMonth() && d.getDate() === ref.getDate();
                }
                if (match) {
                    notes++;
                    chars += (n.content || '').length;
                    (n.comments || []).forEach(c => { chars += (c.text || '').length; });
                }
            });
            return { notes, chars };
        }

        function statsFlip(key) {
            _statsMode[key] = (_statsMode[key] === 'chars') ? 'notes' : 'chars';
            renderStats();
        }

        function renderStats() {
            const refFrom = state.filterDateFrom;
            const total = state.notes.length;
            const totalChars = state.notes.reduce((s, n) => s + (n.content||'').length + (n.comments||[]).reduce((a,c)=>a+(c.text||'').length,0), 0);
            document.getElementById('stats-total').innerText = `共 ${total} 条笔记 · ${totalChars} 字`;

            ['year','month','week','day'].forEach(type => {
                const { notes, chars } = getStatsForRange(type, refFrom);
                const mode = _statsMode[type] || 'notes';
                const val = mode === 'notes' ? notes : chars;
                const sub = mode === 'notes' ? '条数' : '字数';
                document.getElementById(`sv-${type}`).innerText = val;
                document.getElementById(`ss-${type}`).innerText = sub;
            });
        }
        function openModal(id) { document.getElementById(id).classList.add('open'); }
        function closeModal(id) { document.getElementById(id).classList.remove('open'); }
        function saveData() {
            localStorage.setItem('wanwan_notes_v3', JSON.stringify(state.notes));
            localStorage.setItem('wanwan_settings_v3', JSON.stringify(state.settings));
            localStorage.setItem('wanwan_comment_preview', JSON.stringify({
                enabled: state.commentPreviewEnabled,
                name: state.commentPreviewName,
                suffix: state.commentPreviewSuffix,
                syncName: state.commentPreviewSyncName
            }));
        }

        async function exportDataToZip() {
            try {
                const zip = new JSZip();
                zip.file("notes.json", JSON.stringify(state.notes, null, 2));
                zip.file("settings.json", JSON.stringify(state.settings, null, 2));
                const content = await zip.generateAsync({ type: "blob" });
                saveAs(content, `宛宛空间备份_${new Date().toLocaleDateString()}.zip`);
                alert("✅ 导出成功！");
            } catch (e) {
                alert("❌ 导出失败：" + e.message);
            }
        }

        async function importDataFromZip(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            try {
                const zip = new JSZip();
                const contents = await zip.loadAsync(file);
                
                if (contents.files["notes.json"]) {
                    const notesStr = await contents.files["notes.json"].async("string");
                    state.notes = JSON.parse(notesStr);
                }
                if (contents.files["settings.json"]) {
                    const settingsStr = await contents.files["settings.json"].async("string");
                    state.settings = JSON.parse(settingsStr);
                }

                saveData();
                applySettings();
                renderList();
                renderTags();
                renderHistoryAvatars();
                renderHistoryBgs();
                renderFontPresets();
                renderFramePresets();
                alert("✅ 导入成功！页面已刷新数据");
            } catch (e) {
                alert("❌ 导入失败：" + e.message);
            }
            input.value = '';
        }
        // ===================== 时钟 & 电量 =====================
        function updateClock() {
            const now = new Date();
            const M = now.getMonth() + 1;
            const D = now.getDate();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const el = document.getElementById('status-clock');
            if (el) el.innerText = `${M}月${D}日 ${h}:${m}:${s}`;
        }

        function initBattery() {
            if (!navigator.getBattery) return;
            navigator.getBattery().then(bat => {
                function update() {
                    const pct = Math.round(bat.level * 100);
                    const sym = document.getElementById('battery-infinity');
                    const txt = document.getElementById('battery-text');
                    if (!sym || !txt) return;
                    // 电量<=50%只显示∞左半边（overflow:hidden + 固定宽度）
                    if (pct <= 50) {
                        sym.classList.add('half');
                    } else {
                        sym.classList.remove('half');
                    }
                    txt.innerText = pct + '%';
                }
                update();
                bat.addEventListener('levelchange', update);
                bat.addEventListener('chargingchange', update);
            });
        }

        // ===================== 字体预选 =====================
        function renderFontPresets() {
            const container = document.getElementById('font-preset-list');
            container.innerHTML = '';
            const presets = state.settings.fontPresets || [];
            presets.forEach(font => {
                const el = document.createElement('div');
                el.className = 'preset-item' + (state.settings.currentFont === font.id ? ' active' : '');
                el.innerText = font.name;
                el.style.fontFamily = font.dataUrl ? `"custom_font_${font.id}", sans-serif` : font.value;

                // 点击选中
                el.onclick = () => {
                    state.settings.currentFont = font.id;
                    saveData(); applySettings(); renderFontPresets();
                };

                // 长按删除（仅自定义）
                if (!font.isBuiltin) {
                    setupLongPress(el, () => {
                        if (confirm(`删除字体「${font.name}」？`)) {
                            state.settings.fontPresets = state.settings.fontPresets.filter(f => f.id !== font.id);
                            if (state.settings.currentFont === font.id) state.settings.currentFont = 'system';
                            saveData(); applySettings(); renderFontPresets();
                        }
                    });
                }
                container.appendChild(el);
            });
        }

        function addFontPreset(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const nameRaw = file.name.replace(/\.[^/.]+$/, '');
            const label = prompt('给这个字体起个名字：', nameRaw) || nameRaw;
            const reader = new FileReader();
            reader.onload = e => {
                const id = 'custom_font_' + Date.now();
                state.settings.fontPresets.push({ id, name: label, value: id, dataUrl: e.target.result, isBuiltin: false });
                state.settings.currentFont = id;
                saveData(); applySettings(); renderFontPresets();
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        // ===================== 头像框预选 =====================
        function renderFramePresets() {
            const container = document.getElementById('frame-preset-list');
            container.innerHTML = '';
            const presets = state.settings.framePresets || [];
            presets.forEach(frame => {
                const wrapper = document.createElement('div');
                wrapper.className = 'frame-preset-item' + (state.settings.currentFrame === frame.id ? ' active' : '');

                const thumb = document.createElement('img');
                thumb.className = 'frame-preset-thumb';
                // 缩略图：无框用纯色占位，st用框gif，circle用白框，自定义用上传图
                if (frame.value === 'none') {
                    thumb.src = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
                    thumb.style.background = '#eee';
                } else if (frame.value === 'st') {
                    thumb.src = 'https://i.postimg.cc/v8xXtvMP/72ce5c0f0m16d8b4f1b050b6a2ebb6b3.gif';
                } else if (frame.value === 'circle') {
                    thumb.src = 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=';
                    thumb.style.background = '#ccc';
                    thumb.style.border = '3px solid rgba(255,255,255,0.9)';
                } else if (frame.dataUrl) {
                    thumb.src = frame.dataUrl;
                } else if (frame.url) {
                    thumb.src = frame.url;
                }

                const label = document.createElement('div');
                label.className = 'frame-preset-label';
                label.innerText = frame.name;

                wrapper.onclick = () => {
                    state.settings.currentFrame = frame.id;
                    saveData(); applySettings(); renderFramePresets();
                };

                // 长按删除（仅自定义）
                if (!frame.isBuiltin) {
                    setupLongPress(wrapper, () => {
                        if (confirm(`删除头像框「${frame.name}」？`)) {
                            state.settings.framePresets = state.settings.framePresets.filter(f => f.id !== frame.id);
                            if (state.settings.currentFrame === frame.id) state.settings.currentFrame = 'none';
                            saveData(); applySettings(); renderFramePresets();
                        }
                    });
                }

                wrapper.appendChild(thumb);
                wrapper.appendChild(label);
                container.appendChild(wrapper);
            });
        }

        function addFramePresetFromFile(input) {
            if (!input.files[0]) return;
            const file = input.files[0];
            const label = prompt('给这个头像框起个名字：', file.name.replace(/\.[^/.]+$/, '')) || '自定义框';
            const reader = new FileReader();
            reader.onload = e => {
                const id = 'frame_' + Date.now();
                state.settings.framePresets.push({ id, name: label, value: 'custom', dataUrl: e.target.result, isBuiltin: false });
                state.settings.currentFrame = id;
                saveData(); applySettings(); renderFramePresets();
            };
            reader.readAsDataURL(file);
            input.value = '';
        }

        function addFramePresetFromUrl(url) {
            if (!url) return;
            const label = prompt('给这个头像框起个名字：', '自定义框') || '自定义框';
            const id = 'frame_' + Date.now();
            state.settings.framePresets.push({ id, name: label, value: 'custom', url: url, isBuiltin: false });
            state.settings.currentFrame = id;
            document.getElementById('frame-preset-url-input').value = '';
            saveData(); applySettings(); renderFramePresets();
        }

        // ===================== 长按工具函数 =====================
        function setupLongPress(el, callback) {
            let timer = null;
            const start = () => {
                timer = setTimeout(() => { el.classList.add('long-pressing'); callback(); el.classList.remove('long-pressing'); }, 700);
            };
            const cancel = () => { clearTimeout(timer); el.classList.remove('long-pressing'); };
            el.addEventListener('touchstart', start, { passive: true });
            el.addEventListener('touchend', cancel);
            el.addEventListener('touchmove', cancel);
            el.addEventListener('mousedown', start);
            el.addEventListener('mouseup', cancel);
            el.addEventListener('mouseleave', cancel);
        }

    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.log('SW failed:', err));
            });
        }
    </script>
